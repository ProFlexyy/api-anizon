<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <title>Anime Api</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        height: 100%;
        width: 100%;
        max-height: 100vh;
        max-width: 100vw;
        background-color: #000000;
        color: #ce9178;
      }

      .container {
        height: 100%;
        width: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        grid-template-columns: 1fr;
        justify-content: space-between;
        align-items: center;
        position: relative;
      }

      .image-container {
        width: 100%;
        display: flex;
        justify-content: space-between;
        background-size: cover;
        position: relative;
        z-index: 1;
      }

      h1 {
        font-size: 2rem;
        text-align: center;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS",
          sans-serif;
        z-index: 2;
        text-shadow: 0 0 10px rgba(206, 145, 120, 0.5);
        letter-spacing: 1px;
      }

      #gif,
      #mirrored-gif {
        height: 300px;
        width: 300px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        transition: transform 0.3s ease;
      }
      
      #gif:hover,
      #mirrored-gif:hover {
        transform: scale(1.02);
      }

      #mirrored-gif {
        transform: scaleX(-1);
      }
      
      #mirrored-gif:hover {
        transform: scaleX(-1) scale(1.02);
      }

      #pic {
        width: 250px;
        height: 250px;
        border-radius: 50%;
        object-position: center;
        object-fit: cover;
        border: 3px solid #ce9178;
        box-shadow: 0 0 20px rgba(206, 145, 120, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      
      #pic:hover {
        transform: scale(1.02);
        box-shadow: 0 0 30px rgba(206, 145, 120, 0.5);
      }

      .profile {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 2;
        background: rgba(0, 0, 0, 0.7);
        padding: 20px 40px;
        border-radius: 20px;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(206, 145, 120, 0.3);
      }
      
      .github {
        display: flex;
        justify-content: center;
        gap: 10px;
        align-items: center;
        margin-top: 15px;
        background: rgba(206, 145, 120, 0.1);
        padding: 8px 20px;
        border-radius: 50px;
        transition: all 0.3s ease;
      }
      
      .github:hover {
        background: rgba(206, 145, 120, 0.2);
        transform: translateY(-2px);
      }
      
      .fa-github {
        color: #ce9178;
        transition: color 0.3s ease;
      }
      
      .github:hover .fa-github {
        color: #e0a878;
      }
      
      a {
        font-size: 1.3rem;
        color: #7cdcfe;
        text-decoration: none;
        transition: color 0.3s ease;
      }
      
      a:hover {
        color: #9ee6ff;
        text-decoration: underline;
      }
      
      @media (max-width: 700px) {
        .image-container {
          display: none;
        }
        .profile {
          padding: 15px 25px;
          width: 90%;
        }
        #pic {
          width: 180px;
          height: 180px;
        }
        h1 {
          font-size: 1.5rem;
        }
        a {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to API </h1>
      <div class="profile">
        <img id="pic" src="image.webp" alt="" />
        <div class="github">
          <i class="fa fa-github" style="font-size: 36px"></i>
          <a href="https://github.com/ProFlexyy/api-anizon" target="_blank"
            >Click here to refer docs</a
          >
        </div>
      </div>
      <div class="image-container">
        <img
          id="gif"
          src="./wlc.gif"
          alt=""
        />
        <img
          id="mirrored-gif"
          src="./wlc.gif"
          alt=""
        />
      </div>
    </div>
  </body>
</html>
